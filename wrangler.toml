name = "guardrail-tool"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

# Static assets (built SPA) are served by the same Worker.
# /api/* is handled by the Worker; everything else falls through to assets.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
# Override per environment. Defaults are sensible recent models.
OPENROUTER_MODEL_PREFLIGHT = "anthropic/claude-haiku-4.5"
OPENROUTER_MODEL_EXTRACT = "anthropic/claude-haiku-4.5"
OPENROUTER_MODEL_ESCALATE = "anthropic/claude-sonnet-4.6"
ALLOWED_ORIGIN = "*"

# Secrets — set via `wrangler secret put OPENROUTER_API_KEY`
# OPENROUTER_API_KEY (do not commit)
#
# NOTE: Workers Paid plan is recommended. A 4-roundtrip web_search extract
# can run 60–180s and exceed free-tier wall-clock limits.
