name = "guardrail-tool"
main = "worker/index.ts"
compatibility_date = "2024-09-23"

# Static assets (built SPA) are served by the same Worker.
# /api/* is handled by the Worker; everything else falls through to assets.
[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
# Override per environment. The default is a sensible recent model.
OPENROUTER_MODEL = "anthropic/claude-sonnet-4.6"
ALLOWED_ORIGIN = "*"

# Secrets — set via `wrangler secret put OPENROUTER_API_KEY`
# OPENROUTER_API_KEY (do not commit)
